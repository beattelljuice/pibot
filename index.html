<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .api-config {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-config label {
            font-weight: 600;
            color: #667eea;
        }

        .api-config input {
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .api-config button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .api-config button:hover {
            background: #764ba2;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 20px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse-error 2s infinite;
        }

        .status-dot.connected {
            background: #51cf66;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-error {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .motors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .motor-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .motor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .motor-card h2 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 1.4em;
        }

        .motor-type {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95em;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            transition: background 0.3s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: #667eea;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-forward {
            background: #51cf66;
            color: white;
        }

        .btn-forward:hover {
            background: #40c057;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(81, 207, 102, 0.4);
        }

        .btn-backward {
            background: #ffa94d;
            color: white;
        }

        .btn-backward:hover {
            background: #ff9500;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 165, 77, 0.4);
        }

        .btn-stop {
            background: #ff6b6b;
            color: white;
        }

        .btn-stop:hover {
            background: #fa5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .stepper-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stepper-input {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stepper-input input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .stepper-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status-display {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #666;
        }

        .status-display span {
            font-weight: 600;
            color: #667eea;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .error-message {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .motors-grid {
                grid-template-columns: 1fr;
            }

            .api-config {
                flex-direction: column;
            }

            .status-indicator {
                margin-left: 0;
                margin-top: 10px;
            }

            .stepper-controls {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Motor Controller</h1>
            <p>Control DC and Stepper Motors via REST API</p>
        </div>

        <div class="api-config">
            <label for="api-host">API Host:</label>
            <input type="text" id="api-host" value="localhost:5000" placeholder="localhost:5000">
            <button onclick="updateApiConfig()">Update</button>
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
        </div>

        <div class="error-message" id="error-message"></div>

        <div class="motors-grid" id="motors-container">
            <p style="color: white; grid-column: 1 / -1; text-align: center;">Loading motors...</p>
        </div>

        <div class="footer">
            <p>Motor Control System for Raspberry Pi 3B+</p>
        </div>
    </div>

    <script>
        let apiHost = 'http://localhost:5000';
        let motors = {};

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMotors();
            setInterval(updateMotorStatus, 2000);
        });

        function updateApiConfig() {
            const host = document.getElementById('api-host').value;
            if (!host) {
                showError('Please enter a valid API host');
                return;
            }
            apiHost = `http://${host}`;
            loadMotors();
        }

        async function loadMotors() {
            try {
                const response = await fetch(`${apiHost}/motors`);
                if (!response.ok) throw new Error('Failed to connect to API');

                motors = await response.json();
                renderMotors();
                updateConnectionStatus(true);
                clearError();
            } catch (error) {
                console.error('Error loading motors:', error);
                updateConnectionStatus(false);
                showError(`Cannot connect to API at ${apiHost}`);
            }
        }

        function renderMotors() {
            const container = document.getElementById('motors-container');
            container.innerHTML = '';

            Object.entries(motors).forEach(([name, motor]) => {
                const card = createMotorCard(name, motor);
                container.appendChild(card);
            });
        }

        function createMotorCard(name, motor) {
            const card = document.createElement('div');
            card.className = 'motor-card';

            if (motor.type === 'DC') {
                card.innerHTML = `
                    <h2>⚙️ ${name}</h2>
                    <div class="motor-type">DC Motor</div>

                    <div class="control-group">
                        <label>Speed</label>
                        <div class="slider-container">
                            <input type="range" min="0" max="100" value="${motor.speed || 0}"
                                   class="motor-speed" data-motor="${name}">
                            <div class="slider-value" id="speed-${name}">${motor.speed || 0}%</div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button class="btn btn-forward" onclick="controlMotor('${name}', 'direction', 'forward')">
                            ➡️ Forward
                        </button>
                        <button class="btn btn-backward" onclick="controlMotor('${name}', 'direction', 'backward')">
                            ⬅️ Backward
                        </button>
                        <button class="btn btn-stop" onclick="controlMotor('${name}', 'stop')">
                            ⏹️ Stop
                        </button>
                    </div>

                    <div class="status-display">
                        Direction: <span id="dir-${name}">${motor.direction}</span>
                    </div>
                `;

                // Add speed slider listener
                setTimeout(() => {
                    const slider = card.querySelector('.motor-speed');
                    if (slider) {
                        slider.addEventListener('input', (e) => {
                            const speed = e.target.value;
                            document.getElementById(`speed-${name}`).textContent = speed + '%';
                            controlMotor(name, 'speed', parseInt(speed));
                        });
                    }
                }, 0);
            } else if (motor.type === 'Stepper') {
                card.innerHTML = `
                    <h2>🔄 ${name}</h2>
                    <div class="motor-type">Stepper Motor (28BYJ-48)</div>

                    <div class="control-group">
                        <label>Speed (RPM)</label>
                        <div class="slider-container">
                            <input type="range" min="0" max="50" value="${motor.rpm || 10}"
                                   class="stepper-rpm" data-motor="${name}">
                            <div class="slider-value" id="rpm-${name}">${motor.rpm || 10} RPM</div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>Step Control</label>
                        <div class="stepper-controls">
                            <div class="stepper-input">
                                <input type="number" id="steps-${name}" value="100" min="1" placeholder="Steps">
                            </div>
                            <div class="stepper-input">
                                <select id="dir-select-${name}" style="padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;">
                                    <option value="forward">Forward</option>
                                    <option value="backward">Backward</option>
                                </select>
                            </div>
                        </div>
                        <div class="button-group" style="margin-top: 10px;">
                            <button class="btn btn-primary" onclick="stepMotor('${name}')">
                                ✨ Step
                            </button>
                            <button class="btn btn-stop" onclick="controlMotor('${name}', 'stop')">
                                ⏹️ Stop
                            </button>
                        </div>
                    </div>

                    <div class="status-display">
                        Status: <span id="stepping-${name}">${motor.stepping ? 'Stepping' : 'Idle'}</span>
                    </div>
                `;

                // Add RPM slider listener
                setTimeout(() => {
                    const slider = card.querySelector('.stepper-rpm');
                    if (slider) {
                        slider.addEventListener('input', (e) => {
                            const rpm = e.target.value;
                            document.getElementById(`rpm-${name}`).textContent = rpm + ' RPM';
                            controlMotor(name, 'speed', parseFloat(rpm), true);
                        });
                    }
                }, 0);
            }

            return card;
        }

        async function controlMotor(name, action, value, isStepper = false) {
            try {
                let endpoint = `${apiHost}/motors/${name}`;
                let data = {};

                if (action === 'speed') {
                    endpoint += '/speed';
                    data = isStepper ? { rpm: value } : { speed: value };
                } else if (action === 'direction') {
                    endpoint += '/direction';
                    data = { direction: value };
                } else if (action === 'stop') {
                    endpoint += '/stop';
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: Object.keys(data).length > 0 ? JSON.stringify(data) : undefined
                });

                if (!response.ok) throw new Error('API request failed');

                const result = await response.json();
                updateMotorStatus();
                clearError();
            } catch (error) {
                console.error('Error controlling motor:', error);
                showError(`Failed to control motor: ${error.message}`);
            }
        }

        async function stepMotor(name) {
            const stepsInput = document.getElementById(`steps-${name}`);
            const dirSelect = document.getElementById(`dir-select-${name}`);

            if (!stepsInput || !dirSelect) return;

            const steps = parseInt(stepsInput.value) || 100;
            const direction = dirSelect.value;

            if (steps < 1) {
                showError('Steps must be at least 1');
                return;
            }

            try {
                const response = await fetch(`${apiHost}/motors/${name}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ steps, direction })
                });

                if (!response.ok) throw new Error('API request failed');

                updateMotorStatus();
                clearError();
            } catch (error) {
                console.error('Error stepping motor:', error);
                showError(`Failed to step motor: ${error.message}`);
            }
        }

        async function updateMotorStatus() {
            try {
                const response = await fetch(`${apiHost}/motors`);
                if (!response.ok) throw new Error('Failed to fetch status');

                const updatedMotors = await response.json();

                // Update UI with latest status
                Object.entries(updatedMotors).forEach(([name, motor]) => {
                    if (motor.type === 'DC') {
                        const dirElement = document.getElementById(`dir-${name}`);
                        if (dirElement) dirElement.textContent = motor.direction;
                    } else if (motor.type === 'Stepper') {
                        const steppingElement = document.getElementById(`stepping-${name}`);
                        if (steppingElement) {
                            steppingElement.textContent = motor.stepping ? 'Stepping' : 'Idle';
                        }
                    }
                });

                updateConnectionStatus(true);
            } catch (error) {
                updateConnectionStatus(false);
            }
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');

            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = 'Connected';
                text.style.color = '#51cf66';
            } else {
                dot.className = 'status-dot';
                text.textContent = 'Disconnected';
                text.style.color = '#ff6b6b';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.add('show');
        }

        function clearError() {
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.remove('show');
        }
    </script>
</body>
</html>
